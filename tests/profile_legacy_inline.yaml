# Legacy back-compat test fixture — a copy of the ORIGINAL inline demo profile.
analyst: Demo (SaaS coverage)
slug: demo-legacy
created: "2026-05-29"

kpis:
  - label: "cRPO"
    aliases: [current remaining performance obligations, current RPO]
    unit: "$M"
    higher_is_better: true
    extraction_hint: "Current remaining performance obligations (the <12-month portion of RPO)."
  - label: "RPO"
    aliases: [remaining performance obligations, total RPO]
    unit: "$M"
    higher_is_better: true
    extraction_hint: "Total remaining performance obligations."

estimates: {}

output:
  format: both
  memo_dir: "./earnings-memos"

preferences:
  inline_band_pct: 2.0
  eps_inline_band_abs: 0.02
  pp_inline_band: 0.5
  tone: "concise"
  benchmark_convention: "consensus"
